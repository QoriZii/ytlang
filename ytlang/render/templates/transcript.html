<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{VIDEO_TITLE}} — {{NATIVE_LANG_NAME}}台词</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 16px;
  line-height: 1.8;
  color: #333;
  background: #fff;
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

header {
  border-bottom: 1.5px solid #222;
  padding-bottom: 14px;
  margin-bottom: 32px;
}

h1 {
  font-size: 1.125rem;
  font-weight: 700;
  line-height: 1.3;
  color: #222;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── Transcript lines ── */
.line {
  display: flex;
  gap: 20px;
  padding: 7px 0;
  align-items: flex-start;
}

.ts {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.625rem;
  color: #999;
  white-space: nowrap;
  padding-top: 4px;
  min-width: 36px;
  letter-spacing: 0.02em;
}

.text-block { flex: 1; }

.en {
  display: block;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.9375rem;
  color: #222;
  line-height: 1.7;
}

.zh {
  display: block;
  font-size: 0.875rem;
  color: #666;
  line-height: 1.8;
}

.note {
  font-size: 0.8125rem;
  color: #5a6b6b;
  border-left: 2px solid #ddd6c1;
  padding: 2px 10px;
  margin-top: 4px;
  line-height: 1.7;
}

{{BACK_BTN_CSS}}

/* ── Print ── */
@media print {
  body { padding: 20px 24px 40px; font-size: 14px; }
  @page { margin: 20mm 15mm; }
  .line { page-break-inside: avoid; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>

{{BACK_BTN}}
<header>
  <h1>{{VIDEO_TITLE}}</h1>
</header>

<div id="transcript">
{{TRANSCRIPT_LINES}}
</div>

<script>
if (window.location.protocol !== 'file:') {
  document.getElementById('back-btn').style.display = 'flex';
}
</script>
</body>
</html>
