<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{VIDEO_TITLE}} — {{NATIVE_LANG_NAME}}台词</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 16px;
  line-height: 1.8;
  color: #333;
  background: #fff;
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

header {
  border-bottom: 1.5px solid #222;
  padding-bottom: 14px;
  margin-bottom: 32px;
}

h1 {
  font-size: 1.125rem;
  font-weight: 700;
  line-height: 1.3;
  color: #222;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── Transcript lines ── */
.line {
  display: flex;
  gap: 20px;
  padding: 7px 0;
  align-items: flex-start;
}

.ts {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.625rem;
  color: #999;
  white-space: nowrap;
  padding-top: 4px;
  min-width: 36px;
  letter-spacing: 0.02em;
}

.text-block { flex: 1; }

.en {
  display: block;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.9375rem;
  color: #222;
  line-height: 1.7;
}

.zh {
  display: block;
  font-size: 0.875rem;
  color: #666;
  line-height: 1.8;
}

.note {
  font-size: 0.8125rem;
  color: #5a6b6b;
  border-left: 2px solid #ddd6c1;
  padding: 2px 10px;
  margin-top: 4px;
  line-height: 1.7;
}

/* ── Word hover tooltip ── */
.w { cursor: default; }
.w:hover { border-bottom: 1px solid #b58900; }

#w-tip {
  display: none;
  position: absolute;
  background: #073642;
  color: #fdf6e3;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif;
  font-size: 0.8125rem;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
  line-height: 1.4;
}
#w-tip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -4px;
  border: 4px solid transparent;
  border-top-color: #073642;
}

{{BACK_BTN_CSS}}

/* ── Print ── */
@media print {
  body { padding: 20px 24px 40px; font-size: 14px; }
  @page { margin: 20mm 15mm; }
  .line { page-break-inside: avoid; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>

{{BACK_BTN}}
<header>
  <h1>{{VIDEO_TITLE}}</h1>
</header>

<div id="transcript">
{{TRANSCRIPT_LINES}}
</div>

<div id="w-tip"></div>

<script>
if (window.location.protocol !== 'file:') {
  document.getElementById('back-btn').style.display = 'flex';
}

// ── Word hover translation ──
(function() {
  const tip = document.getElementById('w-tip');
  const cache = new Map();
  let hoverTimer = null;
  let activeWord = null;

  function showTip(el, text) {
    tip.textContent = text;
    tip.style.display = 'block';
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth;
    let left = r.left + r.width / 2 - tw / 2;
    if (left < 4) left = 4;
    if (left + tw > window.innerWidth - 4) left = window.innerWidth - 4 - tw;
    tip.style.left = left + window.scrollX + 'px';
    tip.style.top = (r.top + window.scrollY - tip.offsetHeight - 6) + 'px';
  }

  function hideTip() {
    tip.style.display = 'none';
    activeWord = null;
  }

  async function lookup(word) {
    const key = word.toLowerCase().replace(/^['\u2019]+|['\u2019]+$/g, '');
    if (cache.has(key)) return cache.get(key);
    try {
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl={{SOURCE_LANG}}&tl={{NATIVE_LANG}}&dt=t&q=' + encodeURIComponent(key);
      const res = await fetch(url);
      const data = await res.json();
      const zh = data[0].map(s => s[0]).join('');
      cache.set(key, zh);
      return zh;
    } catch { return null; }
  }

  document.getElementById('transcript').addEventListener('mouseenter', function(e) {
    const el = e.target.closest('.w');
    if (!el) return;
    activeWord = el;
    clearTimeout(hoverTimer);
    hoverTimer = setTimeout(async () => {
      if (activeWord !== el) return;
      const text = el.textContent;
      const zh = await lookup(text);
      if (zh && activeWord === el) showTip(el, zh);
    }, 150);
  }, true);

  document.getElementById('transcript').addEventListener('mouseleave', function(e) {
    const el = e.target.closest('.w');
    if (!el) return;
    clearTimeout(hoverTimer);
    hideTip();
  }, true);
})();
</script>
</body>
</html>
