<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{VIDEO_TITLE}} — Handout</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 16px;
  line-height: 1.7;
  color: #222;
  background: #fff;
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 32px 64px;
}

/* ── Header ── */
header {
  border-bottom: 2px solid #222;
  padding-bottom: 16px;
  margin-bottom: 28px;
}

h1 {
  font-size: 1.375rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
}

.meta {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.8125rem;
  color: #666;
}

/* ── About the Game ── */
.game-intro {
  margin-bottom: 36px;
}

.section-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #999;
  margin-bottom: 8px;
}

.game-intro p {
  font-size: 1rem;
  line-height: 1.7;
  color: #333;
}


/* ── Key Points ── */
.key-points {
  margin-bottom: 36px;
}

.kp-list {
  list-style: disc;
  padding-left: 1.25em;
}

.kp-entry {
  padding: 6px 0;
}

.kp-en {
  display: block;
  font-size: 0.9375rem;
  color: #333;
  line-height: 1.6;
}

.kp-zh {
  display: block;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 0.875rem;
  color: #767676;
  line-height: 1.5;
}

/* ── Vocab sections ── */
.vocab-section {
  margin-bottom: 40px;
}

.vocab-section h2 {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding-bottom: 6px;
  border-bottom: 1px solid currentColor;
  margin-bottom: 20px;
}

.vocab-section.basic h2    { color: #4d7c0f; }
.vocab-section.intermediate h2 { color: #b45309; }
.vocab-section.advanced h2  { color: #922b21; }

/* Vocab entries */
.vocab-list {
  list-style: none;
}

.vocab-entry {
  padding: 14px 0;
  border-bottom: 1px solid #e8e8e8;
}

.vocab-entry:last-child {
  border-bottom: none;
}

.entry-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.word {
  font-size: 1.125rem;
  font-weight: 700;
  font-family: Georgia, 'Times New Roman', serif;
}

.pos {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.75rem;
  font-style: italic;
  color: #999;
}

.pron {
  display: block;
  font-size: 0.8125rem;
  font-style: italic;
  color: #888;
  margin-top: -2px;
  margin-bottom: 2px;
}

.zh {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 0.9375rem;
  font-weight: 600;
  line-height: 1.8;
  margin-left: auto;
}

.vocab-section.basic .zh    { color: #4d7c0f; }
.vocab-section.intermediate .zh { color: #b45309; }
.vocab-section.advanced .zh  { color: #922b21; }

.def {
  font-size: 0.9375rem;
  color: #444;
  line-height: 1.7;
  margin-bottom: 4px;
}

.ex {
  font-size: 0.875rem;
  font-style: italic;
  color: #767676;
  line-height: 1.6;
  padding-left: 12px;
  border-left: 2px solid #e0e0e0;
  margin-bottom: 2px;
}

.ex-zh {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 0.8125rem;
  color: #767676;
  line-height: 1.6;
  padding-left: 12px;
  border-left: 2px solid #e0e0e0;
}

/* ── Footer ── */
footer {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.75rem;
  color: #767676;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

footer a { color: #767676; }

/* ── Print ── */
@media print {
  @page { margin: 15mm 12mm; }
  body {
    max-width: none;
    padding: 0;
    font-size: 11px;
    columns: 2;
    column-gap: 10mm;
  }
  header {
    column-span: all;
    margin-bottom: 16px;
  }
  h1 { font-size: 1.1rem; }
  footer {
    column-span: all;
    margin-top: 24px;
  }
  .game-intro {
    column-span: all;
    margin-bottom: 12px;
  }
  .game-intro p { font-size: 0.75rem; line-height: 1.5; }
  .vocab-section { break-inside: avoid-column; }
  .vocab-entry { break-inside: avoid; }
  footer a::after { content: " (" attr(href) ")"; font-size: 0.7rem; }
  footer::after {
    content: "Page " counter(page) " of " counter(pages);
    font-size: 0.7rem;
    color: #aaa;
  }
}

{{BACK_BTN_CSS}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>

{{BACK_BTN}}
<header>
  <h1>{{VIDEO_TITLE}}</h1>
  <div class="meta">{{CHANNEL}} &nbsp;·&nbsp; {{DURATION}} &nbsp;·&nbsp; {{DATE}}</div>
</header>

<section class="game-intro">
  <div class="section-label">About This Video</div>
  <p>{{VIDEO_BRIEF}}</p>
</section>

<section class="key-points">
  <div class="section-label">Key Points</div>
  <ul class="kp-list">{{KEY_POINTS}}</ul>
</section>

<section class="vocab-section basic">
  <h2>Basic</h2>
  <ul class="vocab-list">{{VOCAB_BASIC}}</ul>
</section>

<section class="vocab-section intermediate">
  <h2>Intermediate</h2>
  <ul class="vocab-list">{{VOCAB_INTERMEDIATE}}</ul>
</section>

<section class="vocab-section advanced">
  <h2>Advanced</h2>
  <ul class="vocab-list">{{VOCAB_ADVANCED}}</ul>
</section>

<footer>
  <a href="{{VIDEO_URL}}">{{VIDEO_URL}}</a>
  <span>Generated {{DATE}}</span>
</footer>

<script>
if (window.location.protocol !== 'file:') {
  document.getElementById('back-btn').style.display = 'flex';
}
</script>
</body>
</html>
