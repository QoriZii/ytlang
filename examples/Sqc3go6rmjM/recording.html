<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sénégal : arbres de vie | ARTE Reportage</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fdf6e3;
  --panel: #eee8d5;
  --border: #ddd6c1;
  --text-primary: #073642;
  --text-body: #586e75;
  --text-muted: #93a1a1;
  /* level colors — updated by JS */
  --level-color: #eee8d5;
  --level-deep: #ddd6c1;
}

html, body {
  background: var(--bg);
  color: var(--text-body);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow: hidden;
}

body {
  display: grid;
  grid-template-rows: 1fr auto;
  grid-template-columns: 3fr 1fr;
  height: 100vh;
}

/* ── Video player ── */
#player-wrap {
  grid-row: 1;
  grid-column: 1;
  background: #000;
  position: relative;
}

#player-wrap iframe,
#player-wrap > div {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ── Transcript strip (right sidebar, player height) ── */
#transcript-strip {
  grid-row: 1;
  grid-column: 2;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.t-line {
  flex: 1;
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  transition: background 0.1s;
  overflow: hidden;
}

.t-line:hover { background: rgba(0,0,0,0.03); }

.t-line.prev, .t-line.next {
  opacity: 0.4;
}

.t-line.active {
  background: var(--bg);
  border-left: 4px solid var(--level-color);
}

.t-ts {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.6875rem;
  color: var(--text-muted);
}

.t-line.active .t-ts {
  color: var(--text-body);
}

.t-en {
  font-size: 0.875rem;
  color: var(--text-body);
  line-height: 1.6;
}

.t-line.active .t-en {
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-primary);
}

.t-zh {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 0.8125rem;
  color: var(--text-muted);
  line-height: 1.8;
}

.t-line.active .t-zh {
  font-size: 0.9375rem;
  color: var(--text-body);
}

/* ── Vocab panel (bottom bar under player) ── */
#vocab-panel {
  grid-row: 2;
  grid-column: 1;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto 1fr;
  min-height: 110px;
  max-height: 160px;
  overflow: hidden;
}

/* Level selector */
#level-selector {
  grid-column: 1 / -1;
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 8px 10px 7px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.level-btn {
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--panel);
  color: var(--text-muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.level-btn.active {
  background: var(--level-color);
  color: #fdf6e3;
  border-color: var(--level-color);
}

.level-btn[data-level="all"].active {
  background: var(--border);
  color: var(--text-body);
  border-color: var(--border);
}

/* Vocab strip cards */
.v-line {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  transition: background 0.1s;
  overflow: hidden;
  min-width: 0;
}

.v-line:hover { background: rgba(0,0,0,0.03); }

.v-line.prev, .v-line.next {
  opacity: 0.4;
}

.v-line.active {
  background: var(--bg);
  border-left: 4px solid var(--level-color);
  transition: border-color 0.2s;
}

/* Word + zh on same row */
.v-main {
  display: flex;
  align-items: baseline;
  gap: 8px;
  overflow: hidden;
  min-width: 0;
}

.v-word {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.2;
  color: var(--level-deep);
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.2s;
}

.v-line.active .v-word {
  font-weight: 700;
  font-size: 1.5rem;
}

.v-pos {
  font-size: 0.625rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

.v-pron {
  font-size: 0.75rem;
  font-weight: 400;
  font-style: italic;
  text-transform: none;
  letter-spacing: normal;
  margin-left: 6px;
}

.v-zh {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif;
  font-size: 1rem;
  color: var(--text-body);
  line-height: 1.4;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.v-line.active .v-zh {
  font-weight: 600;
  font-size: 1.125rem;
  color: var(--text-primary);
}

/* ── Page nav buttons ── */
#page-nav {
  grid-row: 2;
  grid-column: 2;
  display: flex;
  border-top: 1px solid var(--border);
  border-left: 1px solid var(--border);
  z-index: 998;
}

.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  background: var(--panel);
  border: none;
  border-radius: 0;
  color: var(--text-muted);
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.icon-btn .material-symbols-outlined { font-size: 2rem; }
.icon-btn + .icon-btn { border-left: 1px solid var(--border); }
.icon-btn:hover { background: var(--text-primary); color: var(--bg); }

/* ── Recording indicator ── */
#rec-dot {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e74c3c;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 999;
  pointer-events: none;
}
body.recording #rec-dot {
  opacity: 1;
  animation: rec-pulse 1.2s ease-in-out infinite;
}
@keyframes rec-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ── Utilities ── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
:focus-visible { outline: 2px solid var(--text-primary); outline-offset: 2px; }
.level-btn:focus-visible, .icon-btn:focus-visible { outline-offset: 0; }
</style>

<script type="application/json" id="transcript-data">[{"seconds": 4, "en": "[Musique]", "zh": "[음악]"}, {"seconds": 8, "en": "Tu vois ici.", "zh": "여기 봐."}, {"seconds": 10, "en": "Ce qui est incroyable avec ces palétuviers, c'est que comment cet arbre-là, qui a une branche que je tiens, à un moment donné il a décidé que son bourgeon n'allait pas être une branche et faire des feuilles, mais aller faire une racine.", "zh": "이 맹그로브 나무들 진짜 신기한 게, 이 나무가 지금 내가 들고 있는 가지처럼, 어느 순간 자기 새싹을 그냥 가지로 만들어서 잎을 내는 게 아니라, 뿌리로 만들기로 결정했다는 거야."}, {"seconds": 24, "en": "Et ça, j'ai essayé d'observer les trucs, j'ai jamais compris.", "zh": "이건 내가 계속 관찰해 봤는데도 도무지 이해가 안 가."}, {"seconds": 29, "en": "En tout cas, ils sont intelligents, ça c'est clair.", "zh": "어쨌든 얘네는 똑똑하다는 건 확실해."}, {"seconds": 34, "en": "Une passion intacte pour la mangrove, les arbres et la nature du Sénégal où Jean GOP vit depuis plus de 30 ans.", "zh": "세네갈의 맹그로브와 나무, 자연에 대한 변함없는 열정, 장 고프는 30년 넘게 이곳에서 살고 있어."}, {"seconds": 42, "en": "Avec son association Nebdaï, il multiplie les projets pour préserver l'environnement.", "zh": "그가 이끄는 네브다이 협회는 환경 보호를 위한 다양한 프로젝트를 진행하고 있어."}, {"seconds": 48, "en": "On est dans l'écosystème de mangrove du delta du Saloum et c'est un écosystème précieux.", "zh": "지금 우리는 살롬 삼각주의 맹그로브 생태계에 있어. 이곳은 정말 소중한 생태계야."}, {"seconds": 53, "en": "Et heureusement cet écosystème aujourd'hui se porte très bien.", "zh": "다행히 지금 이 생태계는 아주 건강한 상태야."}, {"seconds": 59, "en": "Vraiment, il joue son rôle de nursery pour les poissons.", "zh": "정말로 물고기들의 보육원 역할을 제대로 하고 있어."}, {"seconds": 63, "en": "Les palétuviers se régénèrent par eux-mêmes.", "zh": "맹그로브 나무들은 저절로 회복되고 있어."}, {"seconds": 70, "en": "Longtemps menacé par la déforestation, l'augmentation de la salinité et la hausse du niveau de la mer, cette mangrove est donc sur la bonne voie selon Jean GOP.", "zh": "과거에는 삼림 벌채, 염분 증가, 해수면 상승으로 위협받았지만, 지금은 장 고프의 말처럼 회복되고 있는 길이야."}, {"seconds": 82, "en": "Dans le passé, encore aujourd'hui, il y a beaucoup de gens qui ont planté et qui ont accompagné les reboisements.", "zh": "과거에도, 지금도 많은 사람들이 나무를 심고 숲을 되살리는 데 동참해 왔어."}, {"seconds": 87, "en": "Des médailles en fait partie, mais ce qui nous intéresse beaucoup plus que la plantation en tant que tel, c'est de transmettre l'amour de l'écosystème du palétuvier, de l'art de la mangrove aux enfants.", "zh": "메달 같은 건 사실 별로 중요하지 않아. 우리가 진짜 관심 있는 건, 그냥 나무를 심는 것보다 맹그로브 생태계에 대한 사랑과 그 예술을 아이들에게 전달하는 거야."}, {"seconds": 98, "en": "Donc la plupart de nos reboisements sont faits avec les générations futures, avec des enfants.", "zh": "그래서 우리 나무 심기는 대부분 다음 세대, 그러니까 아이들과 함께 하고 있어."}, {"seconds": 104, "en": "Et ont un caractère pédagogique.", "zh": "그리고 이건 교육적인 의미도 가지고 있어."}, {"seconds": 109, "en": "Comme tous les jours, les équipes de Nebdaï partent sur le terrain en route vers le village de Bambou Gare qui vit essentiellement de la pêche et de l'agriculture.", "zh": "네브다이 팀은 매일 현장으로 나서, 주로 낚시와 농업으로 살아가는 밤부 가르 마을로 향하고 있어."}, {"seconds": 122, "en": "Un groupe d'enfants va participer à l'opération de reboisement.", "zh": "아이들 그룹이 나무 심기 작업에 참여할 예정이야."}, {"seconds": 127, "en": "Comme environ 15 000 petits Sénégalais cette année.", "zh": "올해 약 1만 5천 명의 어린 세네갈 아이들이 이런 활동에 참여하고 있어."}, {"seconds": 130, "en": "La zone à reboiser n'est qu'à quelques dizaines de mètres du village.", "zh": "나무를 심을 구역은 마을에서 불과 몇십 미터밖에 떨어지지 않았어."}, {"seconds": 138, "en": "Alors maintenant, toi, tu vas nous faire des paquets de 100.", "zh": "자, 이제 너가 100개씩 묶어서 만들어 줄 거야."}, {"seconds": 142, "en": "La marée est basse, l'opération peut commencer.", "zh": "조수 간만의 차가 커서, 작업을 시작할 수 있어."}, {"seconds": 145, "en": "Maria Matiaré, présidente de l'Association des femmes du village, coordonne les opérations.", "zh": "마을 여성회 회장 마리아 마티아레가 작업을 지휘하고 있어."}, {"seconds": 158, "en": "La déforestation des gens qui ont besoin de bois, donc on a besoin de reboiser.", "zh": "나무가 필요한 사람들 때문에 삼림이 파괴되니까, 우리가 다시 심어야 해."}, {"seconds": 164, "en": "On voit que le sol est très adapté.", "zh": "흙이 정말 딱 맞는 느낌이야."}, {"seconds": 166, "en": "Quand tu reboises, dans quelques années tu pourras retrouver ta mangrove.", "zh": "다시 심으면 몇 년 안에 맹그로브가 다시 살아날 거야."}, {"seconds": 171, "en": "Et comme la mangrove, ça nous permet de survivre parce qu'il y a la reproduction des poissons.", "zh": "맹그로브가 우리 생계에 정말 중요해, 물고기들이 여기서 번식하거든."}, {"seconds": 175, "en": "Les poissons se reproduisent sous les palétuviers.", "zh": "물고기들은 맹그로브 나무 뿌리 밑에서 번식해."}, {"seconds": 178, "en": "Il y a aussi les huîtres qui se reproduisent.", "zh": "굴도 여기서 번식하고."}, {"seconds": 180, "en": "Beaucoup de fruits de mer viennent ici pour faire la reproduction.", "zh": "여러 해산물들이 번식을 위해 이곳을 찾아와."}, {"seconds": 183, "en": "Ça s'appelle comment ?", "zh": "이게 뭐라고 불려?"}, {"seconds": 191, "en": "Ça s'appelle comment ?", "zh": "이게 뭐라고 불려?"}, {"seconds": 203, "en": "Les propagules, c'est-à-dire les plans de palétuvier, isofora vont s'enfoncer dans la vase et seront recouvertes par la mer à marée haute.", "zh": "이게 프로파귤이라고 하는데, 맹그로브 묘목이야. 진흙 속으로 깊이 박혀서 만조 때 바다에 잠기게 돼."}, {"seconds": 210, "en": "Dans deux ans, si tout va bien, il n'y aura que des arbres ici.", "zh": "2년만 지나면 여기 완전히 나무숲이 될 거야."}, {"seconds": 216, "en": "Ça s'appelle comment ?", "zh": "이게 뭐라고 불려?"}, {"seconds": 232, "en": "Si vous êtes comme eux, vous serez toujours debout, vous voyez.", "zh": "너희들도 이렇게 하면 언제까지나 튼튼하게 서 있을 수 있어, 봐."}, {"seconds": 237, "en": "Racine ne suffit pas à tenir ça, il faut plusieurs racines.", "zh": "뿌리 하나만으로는 부족해, 여러 개가 필요해."}, {"seconds": 242, "en": "Ce jour-là, les enfants ont planté 6000 palettiers pour agrandir la mangrove aux portes de leur village.", "zh": "그날 아이들은 6000그루의 맹그로브를 심었어, 마을 앞에 맹그로브를 키우려고."}, {"seconds": 250, "en": "Si notre objectif était que de planter, on allait prendre 15 gaillards costaud, super costaud, on allait les fourmises à les spécialistes.", "zh": "우리 목적이 그냥 심는 거였다면, 15명의 엄청 튼튼한 청년들을 데려와서 전문가들한테 맡겼을 거야."}, {"seconds": 257, "en": "En deux heures, il prendrait 80 000 par l'étuviers.", "zh": "두 시간 만에 8만 그루를 심었을 거야."}, {"seconds": 261, "en": "Mais c'est pas ça l'idée.", "zh": "그게 핵심이 아니야."}, {"seconds": 263, "en": "L'idée derrière, c'est vraiment montrer qu'un enfant peut le faire, qui l'aime ça, qui touche la mangrove, qui touche les palaisuviers.", "zh": "진짜 의도는 아이들이 직접 해볼 수 있다는 걸 보여주는 거지. 맹그로브 숲을 만지고, 팔라이수비에도 손을 대는, 그런 걸 좋아하는 아이들 말이야."}, {"seconds": 270, "en": "Et surtout, aussi, ils font pas que la mangrove.", "zh": "게다가 맹그로브만 심는 게 아니야."}, {"seconds": 272, "en": "Ils font aussi les incontinentaux et là il y a un vrai besoin.", "zh": "대륙들도 심고 있는데, 거기엔 진짜 수요가 있어."}, {"seconds": 278, "en": "Comme ici à l'entrée de la ville de Toubakuta, au bord de la route.", "zh": "여기 투바쿠타 마을 입구, 도로변처럼 말이야."}, {"seconds": 284, "en": "À sollicité l'Association Sportive et Culturelle d'un village voisin pour planter 50 Kai aussi acajou du Sénégal.", "zh": "이웃 마을의 스포츠·문화협회에 부탁해서 50그루의 카이 아카주 세네갈도 심었어."}, {"seconds": 292, "en": "Abdul Diaye est à la manœuvre parce que dans la forêt il n'y a plus de grands arbres.", "zh": "압둘 디아예가 나서고 있는데, 숲엔 이미 큰 나무들이 없거든."}, {"seconds": 307, "en": "S'il est entretenu, protégé des animaux, rants, arrosés en saison sèche, il pourra dépasser 35 mètres de hauteur et 2 mètres de diamètre dans une dizaine d'années.", "zh": "관리만 잘 해주고, 동물들로부터 보호하고, 건기엔 물만 주면 10년 안에 35미터 높이, 2미터 굵기까지 자랄 수 있어."}, {"seconds": 317, "en": "Une aubaine pour les trafiquants de bois.", "zh": "그건 불법 벌목꾼들에겐 딱 좋은 기회지."}, {"seconds": 322, "en": "Là où on en est, il pourra pas parce que c'est sur la route.", "zh": "여긴 도로변이라 그럴 수가 없어."}, {"seconds": 325, "en": "Quand il veut couper l'art, tout le monde est là, tout le monde te voit.", "zh": "나무를 자르려고 해도 사람들이 다 보이잖아."}, {"seconds": 328, "en": "Donc si on le fait ici, on pourra pas les toucher.", "zh": "그래서 여기 심으면 손을 댈 수가 없어."}, {"seconds": 331, "en": "Donc les cas qui sont à l'intérieur de la forêt sont très menacées, menacés par l'homme pour les transformer en pirogue, en meuble, en djembé ou simplement en bois de chauffe.", "zh": "숲속 깊은 곳에 있는 나무들은 정말 위협받고 있어. 사람들 때문에 피로게나 가구, 젬베, 아니면 그냥 땔감으로 바뀌는 거지."}, {"seconds": 348, "en": "Selon le chiffre officiel, le Sénégal perd 40 000 hectares de forêt chaque année.", "zh": "공식 통계에 따르면, 세네갈은 매년 4만 헥타르의 숲을 잃고 있어."}, {"seconds": 354, "en": "Tout ce que je fais ici, le fait de planter, c'est une fierté pour moi parce que dès que tu plantes ce l'arbre, tu fais vivre ta communauté.", "zh": "내가 여기서 하는 일, 나무 심는 거, 그게 내 자랑이야. 나무를 심으면 결국 네가 속한 사람들을 살리는 거니까."}, {"seconds": 366, "en": "On ne peut aimer et protéger que ce que l'on connaît.", "zh": "알고 사랑하고 보호할 수 있는 거야."}, {"seconds": 369, "en": "C'est la philosophie de ses actions réalisées tout au long de l'année.", "zh": "이게 1년 내내 이어지는 활동들의 철학이야."}, {"seconds": 374, "en": "Dans le village de Gwendor, les arbres qui bordent la route ont fier à Lure, mais les forêts alentours ont perdu de leur superbe.", "zh": "괜도르 마을에선 도로변 나무들은 여전히 멋지지만, 주변 숲들은 이미 많이 망가졌어."}, {"seconds": 384, "en": "Le programme éducation environnementale de Nebaï c'est déployés dans une centaine d'écoles avec des activités tout au long de l'année.", "zh": "네바이의 환경교육 프로그램은 1년 내내 활동이 있는 학교 100곳에까지 퍼져 있어."}, {"seconds": 390, "en": "Une Diawara, l'un des animateurs, rend visite à quelques élèves.", "zh": "애니메이터 중 한 명인 디아와라가 몇몇 학생들을 찾아가고 있어."}, {"seconds": 397, "en": "Ça va, vous allez bien et les vacances ça se passe bien et les arbres vous les entendez bien, c'est sûr.", "zh": "그냥 잘 지내? 휴가도 잘 보내고 있고 나무들 소리도 잘 들려, 그렇지?"}, {"seconds": 409, "en": "On était presque moins de 10 millions d'habitants, aujourd'hui on est 17 millions d'habitants.", "zh": "예전에는 거의 1천만 명도 안 됐는데, 지금은 1,700만 명이나 돼."}, {"seconds": 413, "en": "Donc il y aura tout de suite des besoins, donc vraiment on doit planter des arbres, on en a besoin.", "zh": "그래서 바로 수요가 생길 거고, 그래서 정말 나무를 심어야 해. 나무가 필요하거든."}, {"seconds": 419, "en": "Les enfants ont planté dans le récolte, mais aussi chez eux.", "zh": "아이들은 수확할 때도 심었고, 집에서도 심었어."}, {"seconds": 421, "en": "Edward, 12 ans, a même donné des petits noms à son papaye et à son Moringa.", "zh": "에드워드, 12살인데, 자기 파파야랑 모링가에 이름까지 붙였대."}, {"seconds": 429, "en": "Celui-là il s'appelle Dirhams.", "zh": "저건 디르함스라고 해."}, {"seconds": 453, "en": "OK, très bien.", "zh": "오, 좋네."}, {"seconds": 460, "en": "Chaque élève en plus de ses arbres ils ont des carnets, par exemple ici on va s'écrit fils d'identité du parent des arbres.", "zh": "학생들마다 나무들 외에 수첩도 있는데, 여기 보면 나무 부모님 신상정보를 적는 거야."}, {"seconds": 469, "en": "Vraiment, ils ont bien entretenu les arbres parce que si on voit ça, ils l'ont planté au mois de mars.", "zh": "진짜 나무들 잘 키우더라. 보니까 3월에 심었대."}, {"seconds": 473, "en": "C'est le Moringa.", "zh": "모링가야."}, {"seconds": 475, "en": "Ils l'ont planté au mois de mars et les autres arbres, ils l'ont planté au mois de juin.", "zh": "3월에 심었고, 다른 나무들은 6월에 심었어."}, {"seconds": 481, "en": "Maintenant avant ça, on a commencé un travail à l'école.", "zh": "그 전에 학교에서 먼저 작업을 시작했어."}, {"seconds": 482, "en": "On a montré à l'école aux enfants comment faire le compost et quel élément utiliser pour faire le compost.", "zh": "학교에서 아이들에게 퇴비 만드는 법이랑 재료를 가르쳐줬어."}, {"seconds": 492, "en": "Le reboisement, une affaire d'enfant mais aussi de femmes dans le village de Cœur Sembell.", "zh": "나무 심기는 아이들 일뿐만 아니라 쾨르 상벨 마을 여자들 일도 됐어."}, {"seconds": 497, "en": "Nebida a créé une parcelle d'un hectare et demi en agroforesterie pour une coopérative de 21 femmes.", "zh": "네비다가 1.5헥타르짜리 농림 혼합지를 만들어서 21명 여자들 협동조합을 위한 거야."}, {"seconds": 505, "en": "Il y a six ans, il n'y avait rien.", "zh": "6년 전에는 아무것도 없었어."}, {"seconds": 507, "en": "Elles ont planté des milliers d'arbres, des brise-vents, des arbres fruitiers et des arbres fertilitaires qui enrichissent la terre et évitent l'emploi d'engrais chimiques.", "zh": "수천 그루 나무를 심었는데, 바람막이 나무, 과일나무, 그리고 땅을 기름지게 해서 화학비료 안 쓰게 해주는 나무도 심었어."}, {"seconds": 516, "en": "Au sol, des légumes de toutes sortes.", "zh": "땅에는 온갖 채소들이 자라고 있어."}, {"seconds": 518, "en": "Les femmes qui sont ici, elles varient leurs revenus parce qu'elles ont à la fois des revenus et de la nourriture avec les légumes.", "zh": "여기 있는 여자들은 수입을 다양하게 하고 있어. 채소로 돈도 벌고 먹을거리도 챙기고 있거든."}, {"seconds": 525, "en": "Mais elles ont aussi des revenus et de la nourriture avec le Moringa, avec les arbres fruitiers qui sont là-dedans, avec les arbres fourragers qui nous permettent de vendre ou de donner à manger à leurs propres animaux qu'ils ont à la maison.", "zh": "모링가랑 과일나무, 사료용 나무 덕분에 수입도 생기고 먹을거리도 생겨. 그 나무들로 집에 있는 동물들한테 팔거나 먹일 수도 있지."}, {"seconds": 537, "en": "Donc l'idée, c'est d'avoir un système agroforestier.", "zh": "그래서 아이디어는 농림 복합 시스템을 갖추는 거야."}, {"seconds": 542, "en": "C'est parce que ce n'est pas que du maraîchage.", "zh": "이건 그냥 채소 재배만 하는 게 아니거든."}, {"seconds": 543, "en": "C'est vraiment une somme de choses qui va permettre de sécuriser d'un point de vue alimentaire et d'un point de vue financier les dames du village.", "zh": "마을 여성들이 먹을거리도 안정적으로 확보하고, 돈도 벌 수 있게 여러 가지를 함께 하는 거지."}, {"seconds": 553, "en": "Avec une pompe et un puits, cette parcelle s'est transformée en une oasis qui fournit notamment onze tonnes de légumes chaque année.", "zh": "펌프와 우물 덕분에 이 땅이 오아시스로 변해서, 매년 11톤이나 되는 채소를 생산하고 있어."}, {"seconds": 561, "en": "Une partie des récoltes et des revenus est partagée parce que l'on cultive des pommes de terre et beaucoup d'autres choses.", "zh": "수확물과 수입의 일부는 공유돼. 감자도 심고 다른 작물도 많이 키우니까."}, {"seconds": 566, "en": "Quand tu veux cuisiner, tu viens, tu cueilles des tomates et tout ce que tu veux et tu prépares.", "zh": "요리하고 싶을 때 그냥 와서 토마토 따고 싶은 거 따서 바로 요리할 수 있어."}, {"seconds": 573, "en": "Tu n'as plus besoin d'aller au marché pour acheter tout ça parce que tu cueilles pour manger.", "zh": "시장에 갈 필요 없이 여기서 따서 바로 먹으면 되거든."}, {"seconds": 577, "en": "Tu peux aussi vendre et subvenir à tes besoins et à ceux de tes enfants et de ton mari.", "zh": "팔 수도 있어서 너랑 아이들, 남편 생활비도 벌 수 있어."}, {"seconds": 585, "en": "Et puis il y a ces feuilles-là, celles du Moringa récoltées plusieurs fois par semaine.", "zh": "그리고 이 잎들 보이지? 모링가 잎인데, 일주일에 여러 번 따."}, {"seconds": 594, "en": "Le Moringa ou l'effera qui est là, qu'on appelle Nevada, c'est le nom de notre organisation.", "zh": "모링가는 ‘에페라’라고도 부르는데, 여기 있는 건 ‘네바다’야. 우리 단체 이름이야."}, {"seconds": 598, "en": "C'est un arbre de vie.", "zh": "이건 생명의 나무야."}, {"seconds": 601, "en": "On l'appelle, les Anglais quand ils parlaient de lui, la pleine never die.", "zh": "영국 사람들은 이걸 ‘네버 다이’라고 불렀대."}, {"seconds": 605, "en": "C'est un arbre qui ne meurt jamais.", "zh": "죽지 않는 나무라는 뜻이지."}, {"seconds": 607, "en": "Alors il ne meurt jamais pour deux choses.", "zh": "죽지 않는 이유가 두 가지야."}, {"seconds": 609, "en": "Parce qu'il est très résistant à la sécheresse et parce qu'en fait, si tu le manges, tu as quasiment tout ce dont l'humain a besoin pour survivre.", "zh": "가뭄에 엄청 강하고, 먹으면 사람 몸에 필요한 거의 모든 영양소를 다 채울 수 있거든."}, {"seconds": 618, "en": "Dans ses feuilles, on trouve des vitamines, du calcium, du fer, des antioxydants, des protéines.", "zh": "잎에는 비타민, 칼슘, 철분, 항산화 물질, 단백질이 들어 있어."}, {"seconds": 626, "en": "La liste est longue.", "zh": "목록이 엄청 길어."}, {"seconds": 628, "en": "La récolte du jour part directement vers le site de transformation au siège de l'association à Toubacouta.", "zh": "오늘 딴 건 바로 투바쿠타에 있는 단체 본부 가공장으로 보내."}, {"seconds": 636, "en": "Huit femmes y sont employées pour trier, laver, sécher, broyer et transformer les feuilles de Moringa.", "zh": "여덟 명의 여성이 거기서 모링가 잎을 골라서 씻고 말리고 빻아서 가공해."}, {"seconds": 641, "en": "Plus de huit cents femmes de la région produisent pour cette coopérative.", "zh": "이 지역 여성 800명 넘게가 이 협동조합을 위해 생산하고 있어."}, {"seconds": 645, "en": "Feuilles, fruits, graines, tout vient des arbres.", "zh": "잎, 열매, 씨앗, 다 나무에서 나와."}, {"seconds": 650, "en": "Adjinni en est la responsable.", "zh": "아드지니가 그걸 책임지고 있대."}, {"seconds": 655, "en": "Ça c'est fait à base de la Moringa, des fruits de Moringa.", "zh": "이건 모링가로 만든 거야, 모링가 열매로."}, {"seconds": 659, "en": "Donc c'est pour aussi permettre à nos clients d'avoir différents produits sur le Moringa.", "zh": "그래서 고객들이 모링가 제품을 다양하게 살 수 있게 하려는 거지."}, {"seconds": 668, "en": "En quelques heures à peine, les produits récoltés dans la parcelle le matin arrivent en boutique pour y être commercialisés dès l'après-midi.", "zh": "아침에 따서 수확한 것들이 몇 시간 만에 매장에 도착해, 그날 오후부터 바로 판매된대."}, {"seconds": 691, "en": "À la poudre, les bonbons. Il y a aussi des constructeurs qui sont là et du miel aussi.", "zh": "가루도 있고, 사탕도 있고, 건축 자재도 있고, 꿀도 있어."}, {"seconds": 698, "en": "Ça, c'est le charbon de paille qui est fait à base d'argile et de paille.", "zh": "이건 짚으로 만든 숯이야. 점토랑 짚으로 만들었대."}, {"seconds": 702, "en": "Donc c'est pas du bois, on peut cuisiner sans pour autant couper la forêt.", "zh": "나무가 아니라서, 숲을 베지 않고도 요리할 수 있어."}, {"seconds": 706, "en": "Voilà, donc ça ça sauve la forêt.", "zh": "이게 숲을 지켜주는 거지."}, {"seconds": 713, "en": "Planter des arbres pour créer un Sénégal plus vert et plus prospère, c'est l'objectif de toutes ces initiatives.", "zh": "나무를 심어서 세네갈을 더 푸르고 더 잘 사는 곳으로 만들자는 게, 이 모든 노력의 목표야."}, {"seconds": 722, "en": "En s'appuyant sur les femmes et en pariant sur la nouvelle génération.", "zh": "여성들을 중심으로, 그리고 새로운 세대에 기대면서."}, {"seconds": 738, "en": "[Musique]", "zh": "[음악]"}]</script>

<script>
const VIDEO_ID = "Sqc3go6rmjM";

const LEVEL_COLORS = {
  all:          { color: '#657b83', deep: '#586e75' },
  basic:        { color: '#65a30d', deep: '#4d7c0f' },
  intermediate: { color: '#b45309', deep: '#92400e' },
  advanced:     { color: '#c0392b', deep: '#922b21' },
};
function applyLevelColor(level) {
  const c = LEVEL_COLORS[level] || LEVEL_COLORS.all;
  document.documentElement.style.setProperty('--level-color', c.color);
  document.documentElement.style.setProperty('--level-deep', c.deep);
}


const VOCAB_DATA = JSON.parse(document.getElementById('vocab-data').textContent);
const TRANSCRIPT_DATA = JSON.parse(document.getElementById('transcript-data').textContent);

// ── State ──
let currentLevel = localStorage.getItem('ytlang-level') || 'all';
let filteredVocab = [];
let cardIndex = 0;
let manualNavAt = 0;
let ytPlayer = null;

// ── Screen recording ──
let mediaRecorder = null;
let recChunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getDisplayMedia({
    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
    audio: true
  });

  const mimeType = 'video/webm;codecs=vp9';
  const ext = 'webm';

  const date = new Date().toISOString().slice(0, 10);
  const slug = document.title
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
  const filename = `${date}_${slug}_${VIDEO_ID}.${ext}`;

  mediaRecorder = new MediaRecorder(stream, {
    mimeType,
    videoBitsPerSecond: 8_000_000
  });

  // Stream directly to disk via File System Access API to avoid memory limits on long recordings
  let writableStream = null;
  try {
    const fileHandle = await window.showSaveFilePicker({
      suggestedName: filename,
      types: [{ description: 'WebM Video', accept: { 'video/webm': ['.webm'] } }],
    });
    writableStream = await fileHandle.createWritable();
  } catch {
    // User cancelled picker or API unavailable — fall back to in-memory
  }

  recChunks = [];
  mediaRecorder.ondataavailable = async e => {
    if (!e.data.size) return;
    if (writableStream) {
      await writableStream.write(e.data);
    } else {
      recChunks.push(e.data);
    }
  };
  mediaRecorder.onstop = async () => {
    if (writableStream) {
      await writableStream.close();
    } else {
      const blob = new Blob(recChunks, { type: mimeType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }
    document.body.classList.remove('recording');
    document.getElementById('rec-status').textContent = 'Recording stopped';
    stream.getTracks().forEach(t => t.stop());
  };
  mediaRecorder.start(5000); // flush to disk every 5 s
  document.body.classList.add('recording');
  document.getElementById('rec-status').textContent = 'Recording started';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

// ── YT IFrame API ──
window.onYouTubeIframeAPIReady = function () {
  ytPlayer = new YT.Player('yt-iframe', {
    videoId: VIDEO_ID,
    width: '100%',
    height: '100%',
    playerVars: {
      rel: 0,
      controls: 1,
      modestbranding: 1
    },
    events: {
      onReady: () => {
        const seekTo = new URLSearchParams(location.search).get('t');
        if (seekTo) doSeek(Number(seekTo));
        startPolling();
      },
      onStateChange: (event) => {
        if (event.data === YT.PlayerState.ENDED) stopRecording();
      }
    }
  });
};

function loadYTApi() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
loadYTApi();

function doSeek(seconds) {
  if (ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(seconds, true);
}

// ── Level selector ──
function setLevel(level) {
  currentLevel = level;
  localStorage.setItem('ytlang-level', level);
  applyLevelColor(level);

  document.querySelectorAll('.level-btn').forEach(btn => {
    const isActive = btn.dataset.level === level;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });

  filteredVocab = level === 'all'
    ? [...VOCAB_DATA].sort((a, b) => a.example_seconds - b.example_seconds)
    : VOCAB_DATA.filter(v => v.level === level)
                .sort((a, b) => a.example_seconds - b.example_seconds);

  cardIndex = 0;
  renderVocabStrip();
}

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lvl = btn.dataset.level;
    if (lvl === currentLevel && lvl !== 'all') {
      setLevel('all');
    } else {
      setLevel(lvl);
    }
  });
});

// ── Vocab strip ──
function fmtSeconds(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}


function renderVocabStrip() {
  function fillVocab(el, v) {
    if (!v) { el.innerHTML = ''; return null; }
    const c = LEVEL_COLORS[v.level] || LEVEL_COLORS.all;
    const pron = v.pronunciation ? `<span class="v-pron">${escHtml(v.pronunciation)}</span>` : '';
    el.innerHTML =
      `<span class="v-main"><span class="v-word" style="color:${c.deep}">${escHtml(v.word)}</span><span class="v-zh" lang="zh">${escHtml(v.zh)}</span></span>` +
      `<span class="v-pos">${escHtml(v.pos)}${pron}</span>`;
    return c;
  }

  fillVocab(document.getElementById('v-prev'), filteredVocab[cardIndex - 1] || null);
  const activeColor = fillVocab(document.getElementById('v-active'), filteredVocab[cardIndex] || null);
  fillVocab(document.getElementById('v-next'), filteredVocab[cardIndex + 1] || null);

  if (activeColor) {
    document.getElementById('v-active').style.borderLeftColor = activeColor.color;
  }
}

function navigateCard(delta) {
  const next = cardIndex + delta;
  if (next >= 0 && next < filteredVocab.length) {
    manualNavAt = Date.now();
    cardIndex = next;
    renderVocabStrip();
    doSeek(filteredVocab[cardIndex].example_seconds);
  }
}

function togglePlayback() {
  if (ytPlayer && ytPlayer.getPlayerState) {
    ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
  }
}

function addActivation(id, fn) {
  const el = document.getElementById(id);
  el.addEventListener('click', fn);
  el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fn(); } });
}
addActivation('v-prev', () => navigateCard(-1));
addActivation('v-next', () => navigateCard(1));
addActivation('v-active', () => {
  const v = filteredVocab[cardIndex];
  if (v) { manualNavAt = Date.now(); doSeek(v.example_seconds); }
});

// ── Transcript strip ──
let activeTranscriptIdx = -1;

function renderTranscriptStrip(idx) {
  if (idx === activeTranscriptIdx) return;
  activeTranscriptIdx = idx;

  function fillLine(el, entry) {
    if (!entry) { el.innerHTML = ''; return; }
    const s = entry.seconds;
    const ts = fmtSeconds(s);
    el.innerHTML = `<span class="t-ts">${ts}</span><span class="t-en">${escHtml(entry.en)}</span><span class="t-zh" lang="zh">${escHtml(entry.zh)}</span>`;
    el.onclick = () => doSeek(s);
  }

  fillLine(document.getElementById('t-prev'), TRANSCRIPT_DATA[idx - 1] || null);
  fillLine(document.getElementById('t-active'), TRANSCRIPT_DATA[idx] || null);
  fillLine(document.getElementById('t-next'), TRANSCRIPT_DATA[idx + 1] || null);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Polling ──
function startPolling() {
  setInterval(() => {
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    const t = ytPlayer.getCurrentTime();
    updateTranscript(t);
    updateVocabAutoAdvance(t);
  }, 500);
}

function updateTranscript(t) {
  let idx = 0;
  for (let i = 0; i < TRANSCRIPT_DATA.length; i++) {
    if (TRANSCRIPT_DATA[i].seconds <= t) idx = i;
    else break;
  }
  renderTranscriptStrip(idx);
}

function updateVocabAutoAdvance(t) {
  if (!filteredVocab.length) return;
  if (Date.now() - manualNavAt < 5000) return;

  const next = cardIndex + 1;
  if (next < filteredVocab.length && t >= filteredVocab[next].example_seconds) {
    cardIndex = next;
    renderVocabStrip();
  }
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch (e.key) {
    case ' ':
      e.preventDefault();
      togglePlayback();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      navigateCard(-1);
      break;
    case 'ArrowRight':
      e.preventDefault();
      navigateCard(1);
      break;
    case 'r': case 'R':
      if (!mediaRecorder || mediaRecorder.state === 'inactive') startRecording();
      else stopRecording();
      break;
    case 'j': case 'J':
      doSeek(ytPlayer.getCurrentTime() - 5);
      break;
    case 'l': case 'L':
      doSeek(ytPlayer.getCurrentTime() + 5);
      break;
    case 'k': case 'K':
      togglePlayback();
      break;
    default:
      if (e.key >= '1' && e.key <= '9') {
        const speeds = [0.5, 0.6, 0.7, 0.8, 1.0, 1.25, 1.5, 1.75, 2.0];
        const idx = parseInt(e.key) - 1;
        if (ytPlayer && ytPlayer.setPlaybackRate) ytPlayer.setPlaybackRate(speeds[idx]);
      }
  }
});

// ── Transcript strip keyboard ──
['t-prev', 't-active', 't-next'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById(id).click(); }
  });
});

// ── Init ──
setLevel(currentLevel);
renderTranscriptStrip(0);
</script>
